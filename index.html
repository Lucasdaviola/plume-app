<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plume - Prospection de Concerts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Calibri', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);

        }

        .container {

        }

        header {
            background: white;
            border-radius: 8px;

            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 32px;
            color: #2C3E50;
            margin-bottom: 5px;
        }

        .header-left p {
            color: #7F8C8D;
            font-style: italic;

        }

        .header-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .metric {
            text-align: center;
            padding: 15px 20px;
            background: #ECF0F1;
            border-radius: 6px;
            min-width: 120px;
        }

        .metric-label {
            font-size: 12px;
            color: #7F8C8D;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 24px;

        }

        nav {
            background: white;
            border-radius: 8px;
            padding: 0;

            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        nav li {
            flex: 0 auto;
        }

        nav a {
            display: block;
            padding: 16px 20px;

            color: #2C3E50;
            font-weight: 500;
            border-right: 1px solid #ECF0F1;
            transition: all 0.3s;
            text-align: center;
            cursor: pointer;
        }

        nav li:last-child a {
            border-right: none;
        }

        nav a:hover, nav a.active {

            color: white;
        }

        .content {

<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>🎼 Plume</h1>
                <p>Tableau de Prospection & Suivi Concerts</p>
            </div>
            <div class="header-right">
                <div class="metric">
                    <div class="metric-label">TOTAL CONTACTS</div>
                    <div class="metric-value" id="total-contacts">0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">À CONTACTER</div>
                    <div class="metric-value" id="to-contact">0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">CONFIRMÉS</div>
                    <div class="metric-value" id="confirmed">0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">EN COURS</div>
                    <div class="metric-value" id="in-progress">0</div>
                </div>
            </div>
        </header>

        <nav>
            <ul>
                <li><a class="nav-link active" onclick="loadPage('prospection')">📊 Prospection</a></li>
                <li><a class="nav-link" onclick="loadPage('contacts')">📇 Contacts</a></li>
                <li><a class="nav-link" onclick="loadPage('equipe')">👥 Équipe</a></li>
                <li><a class="nav-link" onclick="loadPage('programmes')">🎵 Programmes</a></li>
                <li><a class="nav-link" onclick="loadPage('concerts')">🎼 Concerts</a></li>
            </ul>
        </nav>

        <div class="content" id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Chargement...</p>
            </div>
        </div>
    </div>

    <div id="formModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Ajouter un contact</h2>
                <button class="close" onclick="closeModal()">&times;</button>
            </div>
            <form id="dataForm" onsubmit="saveContact(event)">
                <div id="formFields"></div>
                <div style="margin-top: 20px;">
                    <button type="submit" class="btn">✓ Enregistrer</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDWTmB51tKKrq5Vp1MYejKTCDWTfdWKo7U",
            authDomain: "plume-prospection.firebaseapp.com",
            databaseURL: "https://plume-prospection-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "plume-prospection",
            storageBucket: "plume-prospection.firebasestorage.app",
            messagingSenderId: "633805507798",
            appId: "1:633805507798:web:c567a4530d9a52fc39cd77",
            measurementId: "G-D7LMPQXVEJ"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        window.db = database;
        window.dbRef = ref;
        window.dbGet = get;
        window.dbSet = set;
        window.dbPush = push;
        window.dbRemove = remove;

        const EQUIPE = [
            { nom: "Flore Seube", telephone: "+33 6 21 97 36 12", email: "flore.seube@gmail.com" },
            { nom: "Mathilde Vialle", telephone: "+33 6 26 90 49 51", email: "mathildevialle@gmail.com" },
            { nom: "Benjamin Garnier", telephone: "06 15 19 04 59", email: "monosaure@gmail.com" },
            { nom: "Lucas Peres", telephone: "0616186613", email: "lucas.lirone@gmail.com" }
        ];

        const PROGRAMMES = [
            { titre: "Crystal Teares", description: "Musique anglaise pour consort de violes" },
            { titre: "Consort Songs", description: "Musique pour voix et consort de violes" },
            { titre: "La Gamba", description: "Musique italienne pour violes de gambe" }
        ];

        window.loadPage = async function(page) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            event.target.classList.add('active');

            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Chargement...</p></div>';

            if (page === 'prospection') await loadProspection();
            else if (page === 'contacts') await loadContacts();
            else if (page === 'equipe') loadEquipe();
            else if (page === 'programmes') loadProgrammes();
            else if (page === 'concerts') await loadConcerts();
        };

        window.loadProspection = async function() {
            try {
                const snapshot = await window.dbGet(window.dbRef(window.db, 'contacts'));
                const contacts = snapshot.val() ? Object.entries(snapshot.val()).map(([key, val]) => ({id: key, ...val})) : [];

                updateMetrics(contacts);

                let html = `<div class="content-header">
                    <h2>📊 Prospection Contacts</h2>
                    <div class="button-group">
                        <button class="btn" onclick="openAddContactModal()">➕ NOUVEAU CONTACT</button>
                        <button class="btn btn-secondary" onclick="openNewProspectionModal()">📋 NOUVELLE PROSPECTION</button>
                    </div>
                </div>`;

                if (contacts.length === 0) {
                    html += '<div class="empty-state"><div class="empty-state-icon">📭</div><p>Aucun contact pour le moment</p></div>';
                } else {
                    html += `<div style="overflow-x: auto;">
                        <table>
                            <thead><tr>
                                <th>Structure / Festival</th>
                                <th>Directeur / Programmateur</th>
                                <th>Coordonnées</th>
                                <th>Thématique / Ligne</th>
                                <th>Programme</th>
                                <th>Responsable</th>
                                <th>Statut</th>
                                <th>Notes & Commentaires</th>
                                <th style="width: 100px;">Actions</th>
                            </tr></thead><tbody>`;

                    contacts.forEach(contact => {
                        html += `<tr>
                            <td><strong>${contact.structure || ''}</strong></td>
                            <td>${contact.directeur || ''}</td>
                            <td>
                                ${contact.email_directeur ? '<div>' + contact.email_directeur + '</div>' : ''}
                                ${contact.telephone ? '<div>' + contact.telephone + '</div>' : ''}
                            </td>
